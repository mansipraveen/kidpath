<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KidPath - Find Their Spark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #FFFBF0; min-height: 100vh; max-width: 480px; margin: 0 auto; }
        .hero { background: #6C63FF; padding: 40px 20px 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .hero h1 { font-size: 38px; color: #fff; }
        .hero p { color: #E8E6FF; margin-top: 8px; font-size: 15px; }
        .hero .tag { font-size: 12px; color: #C8C3FF; margin-top: 8px; background: rgba(255,255,255,0.15); display: inline-block; padding: 4px 12px; border-radius: 12px; }
        .mascots { font-size: 36px; animation: bounce 1.2s ease infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .welcome { padding: 20px; }
        .speech { background: #fff; border: 2px solid #FFD93D; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 16px; font-size: 16px; color: #333; line-height: 1.4; }
        .label { font-size: 15px; font-weight: 600; color: #333; margin: 14px 0 8px; }
        .input { width: 100%; background: #fff; border: 2px solid #E8E8E8; border-radius: 16px; padding: 14px; font-size: 16px; outline: none; }
        .input:focus { border-color: #6C63FF; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; color: #fff; cursor: pointer; margin-top: 20px; }
        .btn-red { background: #FF6B6B; }
        .btn-green { background: #4CAF50; }
        .btn-purple { background: #6C63FF; }
        .cities { text-align: center; padding: 20px; color: #888; font-size: 12px; }
        .cities strong { color: #666; font-size: 14px; display: block; margin-bottom: 6px; }
        .back { padding: 16px; padding-top: 20px; }
        .back a { color: #6C63FF; font-weight: 600; text-decoration: none; font-size: 15px; cursor: pointer; }
        .form-header { background: #A855F7; padding: 20px; padding-top: 30px; text-align: center; border-radius: 0 0 25px 25px; }
        .form-header h2 { color: #fff; font-size: 20px; margin-top: 8px; }
        .form-section { padding: 16px; }
        .chips { display: flex; flex-wrap: wrap; }
        .chip { padding: 10px 14px; border-radius: 20px; background: #fff; border: 2px solid #E8E8E8; margin: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; }
        .chip.active-red { background: #FF6B6B; border-color: #FF6B6B; color: #fff; }
        .chip.active-purple { background: #A855F7; border-color: #A855F7; color: #fff; }
        .chip.active-blue { background: #3B82F6; border-color: #3B82F6; color: #fff; }
        .chip.active-pink { background: #EC4899; border-color: #EC4899; color: #fff; }
        .chip.active-teal { background: #14B8A6; border-color: #14B8A6; color: #fff; }
        .chip.active-amber { background: #F59E0B; border-color: #F59E0B; color: #fff; }
        .area-opt { padding: 12px; border-radius: 12px; background: #fff; border: 2px solid #E8E8E8; margin-bottom: 6px; cursor: pointer; font-size: 14px; }
        .area-opt.active { background: #F59E0B; border-color: #F59E0B; color: #fff; font-weight: bold; }
        .result-banner { display: flex; align-items: center; padding: 16px; }
        .result-banner .mascot { font-size: 28px; margin-right: 8px; animation: bounce 1.2s ease infinite; }
        .result-banner h3 { font-size: 16px; color: #333; }
        .empty { text-align: center; padding: 30px; }
        .empty .emoji { font-size: 50px; }
        .empty p { color: #666; margin-top: 10px; }
        .empty .hint { color: #888; font-size: 14px; margin-top: 6px; }
        .card { background: #fff; border-radius: 16px; padding: 14px; margin: 0 16px 12px; border-left: 5px solid #ccc; cursor: pointer; }
        .card-top { display: flex; align-items: center; }
        .card-emoji { font-size: 28px; margin-right: 10px; }
        .card-title { font-size: 15px; font-weight: bold; color: #333; }
        .card-sub { font-size: 12px; color: #888; }
        .card-price { font-size: 15px; font-weight: bold; margin-left: auto; }
        .card-info { font-size: 12px; color: #666; margin-top: 6px; }
        .card-desc { font-size: 13px; color: #555; margin-top: 4px; }
        .detail-head { background: #FF6B6B; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .detail-head .emoji { font-size: 50px; }
        .detail-head h2 { color: #fff; margin-top: 8px; font-size: 22px; }
        .detail-head .sub { color: rgba(255,255,255,0.85); font-size: 15px; margin-top: 3px; }
        .detail-head .badge { background: rgba(255,255,255,0.25); display: inline-block; padding: 4px 12px; border-radius: 12px; color: #fff; font-size: 13px; margin-top: 8px; }
        .info-row { display: flex; padding: 12px; }
        .info-box { flex: 1; border-radius: 12px; padding: 12px; text-align: center; margin: 0 4px; }
        .info-box.orange { background: #FFF3E0; }
        .info-box.green { background: #E8F5E9; }
        .info-box.blue { background: #E3F2FD; }
        .info-box .icon { font-size: 20px; }
        .info-box .val { font-size: 15px; font-weight: bold; color: #333; margin-top: 4px; }
        .section { padding: 14px; }
        .section h3 { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .section p { font-size: 14px; color: #555; line-height: 1.5; }
        .hidden { display: none; }
    </style>
</head>
<body>

    { id:'13', name:'Gymboree Play and Music', provider:'Gymboree', category:'Play', distance:3.0, ageRange:'0-5', price:70, days:1, description:'Physical, cognitive, and social development. Open gym, art labs, music, and sensory play.', schedule:'Multiple classes daily', address:'Seattle Metro', area:'seattle', interests:['active','social','creative'], emoji:'🎈', url:'https://www.gymboreeclasses.com' },
    { id:'14', name:'Crawlers Sensory Play', provider:'ParentMap', category:'Play', distance:2.0, ageRange:'0-1', price:35, days:1, description:'Obstacle courses and sensory exploration for crawlers. Supports physical confidence!', schedule:'Weekday mornings', address:'Seattle, WA', area:'seattle', interests:['active','curious'], emoji:'🐛', url:'https://www.parentmap.com' },
    { id:'15', name:'YMCA Early Education Redmond', provider:'Seattle YMCA', category:'Learning', distance:4.5, ageRange:'1-5', price:110, days:2, description:'Licensed early ed focused on learning, language, and social skills. Financial aid available.', schedule:'Mon-Fri flexible', address:'Redmond, WA', area:'redmond', interests:['social','curious','calm'], emoji:'🌟', url:'https://www.seattleymca.org' },
    { id:'16', name:'Kirkland Dance Academy Tots', provider:'Kirkland Dance', category:'Dance', distance:4.0, ageRange:'2-5', price:90, days:1, description:'Creative movement and pre-ballet for toddlers. Rhythm, coordination, and self-expression.', schedule:'Saturdays 9:30-10:15 AM', address:'Kirkland, WA', area:'kirkland', interests:['creative','active','social'], emoji:'💃', url:'https://www.kirklanddance.com' },
    { id:'17', name:'Issaquah Parks Tiny Tots', provider:'Issaquah Parks', category:'Play', distance:7.0, ageRange:'1-4', price:50, days:1, description:'Structured play with crafts, music, outdoor play, and social time. Small class sizes.', schedule:'Tuesdays 10-11:30 AM', address:'Issaquah Community Center', area:'issaquah', interests:['social','creative','active'], emoji:'🎨', url:'https://www.issaquahwa.gov/parks' },

    { id:'19', name:'Mercer Island Swim Club Tots', provider:'MI Community Ctr', category:'Swimming', distance:5.5, ageRange:'0-5', price:85, days:2, description:'Small group swim at Mary Wayte Pool. Parent-tot and preschool levels. Warm water pool.', schedule:'Tue/Thu 9:30-10 AM', address:'Mercer Island Community Ctr', area:'mercer_island', interests:['active','brave'], emoji:'🏊', url:'https://www.mercerisland.gov/parksrec' },
    { id:'20', name:'Newcastle Soccer Sprouts', provider:'Newcastle Parks', category:'Sports', distance:4.5, ageRange:'3-5', price:70, days:1, description:'Intro soccer for preschoolers at Lake Boren Park. Fun, movement, and teamwork.', schedule:'Saturdays 10-10:45 AM', address:'Lake Boren Park, Newcastle', area:'newcastle', interests:['active','social','brave'], emoji:'⚽', url:'https://www.newcastlewa.gov/parks' },
    { id:'21', name:'Kiddie Academy Kirkland', provider:'Kiddie Academy', category:'Learning', distance:4.2, ageRange:'0-5', price:140, days:3, description:'Life Essentials curriculum with character ed, STEM, fitness, and creative arts.', schedule:'Mon-Fri 7 AM-6 PM', address:'Kirkland, WA', area:'kirkland', interests:['social','curious','creative'], emoji:'🏫', url:'https://kiddieacademy.com/academies/kirkland' },
    { id:'22', name:'Redmond Toddler Art Studio', provider:'Creative Kids', category:'Arts', distance:5.5, ageRange:'2-5', price:80, days:1, description:'Messy art play! Finger painting, clay, collage, and sensory art. Take-home projects weekly.', schedule:'Thursdays 10-11 AM', address:'Redmond Town Center area', area:'redmond', interests:['creative','calm','curious'], emoji:'🖌️', url:'https://www.redmond.gov/parks' },
    { id:'23', name:'Bellevue Aquatic Center Tots', provider:'Bellevue Parks', category:'Swimming', distance:3.5, ageRange:'0-5', price:75, days:2, description:'Warm-water tot pool swim lessons. Water confidence, safety, and basic strokes.', schedule:'Mon/Wed 10-10:30 AM', address:'Bellevue Aquatic Center', area:'bellevue', interests:['active','brave'], emoji:'💦', url:'https://bellevuewa.gov/city-government/departments/parks' },
    { id:'24', name:'Issaquah Music Garden', provider:'Music Garden', category:'Music', distance:7.5, ageRange:'0-4', price:85, days:1, description:'Kindermusik-inspired classes. Live guitar, singing, dancing, and percussion in a cozy studio.', schedule:'Fridays 9:30-10:15 AM', address:'Issaquah Highlands, WA', area:'issaquah', interests:['creative','calm','social'], emoji:'🎸', url:'https://www.musicgardenkids.com' },
    { id:'25', name:'Sammamish Tiny Tumblers', provider:'Eastside Gymnastics', category:'Gymnastics', distance:8.5, ageRange:'2-5', price:95, days:1, description:'Mini obstacle courses, balance beams, and tumbling. Gross motor skills and confidence!', schedule:'Mondays 10-10:45 AM', address:'Sammamish, WA', area:'sammamish', interests:['active','brave','social'], emoji:'🌟', url:'https://www.eastsidegymnastics.com' },
    { id:'26', name:'Kirkland Library Baby Bounce', provider:'KCLS', category:'Learning', distance:3.8, ageRange:'0-2', price:0, days:1, description:'FREE! Bouncy rhymes, songs, and board books for babies and toddlers. No registration needed.', schedule:'Wednesdays 10:30 AM', address:'Kirkland Library', area:'kirkland', interests:['calm','social'], emoji:'📖', url:'https://kcls.org/locations/kirkland-library' },
    { id:'27', name:'Newcastle Little Explorers', provider:'Newcastle Parks', category:'Outdoors', distance:4.0, ageRange:'2-5', price:55, days:1, description:'Trail walks at Coal Creek Park. Creek splashing, rock collecting, and nature journaling.', schedule:'Tuesdays 9:30-11 AM', address:'Coal Creek Park, Newcastle', area:'newcastle', interests:['curious','active','calm'], emoji:'🪨', url:'https://www.newcastlewa.gov/parks' },
    { id:'28', name:'Mercer Island Preschool Art', provider:'MI Parks and Rec', category:'Arts', distance:5.0, ageRange:'3-5', price:95, days:1, description:'Mixed media art: paint, clay, weaving, and printmaking. Inspired by famous artists!', schedule:'Thursdays 1-2 PM', address:'Mercer Island Community Ctr', area:'mercer_island', interests:['creative','calm','curious'], emoji:'🎭', url:'https://www.mercerisland.gov/parksrec' }
];

var state = { screen:'welcome', childName:'', childAge:'', interests:[], maxDays:2, commute:5, area:'any', results:[], selected:null, mascot:['🐻','🐰','🦊','🐸','🦄','🐼'][Math.floor(Math.random()*6)] };

function setState(updates) { Object.assign(state, updates); render(); }

function toggleInterest(id) {
    var i = state.interests.indexOf(id);
    if (i !== -1) { state.interests.splice(i, 1); } else { state.interests.push(id); }
    render();
}

function filterActivities() {
    var age = parseInt(state.childAge) || 3;
    return ACTIVITIES.filter(function(a) {
        var parts = a.ageRange.split('-');
        if (age < parseInt(parts[0]) || age > parseInt(parts[1])) return false;
        if (state.area === 'any' && a.distance > state.commute) return false;
        if (a.days > state.maxDays) return false;
        if (state.area !== 'any' && a.area !== state.area) return false;
        if (state.interests.length > 0) {
            var match = false;
            for (var i = 0; i < state.interests.length; i++) { if (a.interests.indexOf(state.interests[i]) !== -1) { match = true; break; } }
            if (!match) return false;
        }
        return true;
    }).sort(function(a, b) {
        if (state.interests.length === 0) return a.distance - b.distance;
        var sa = 0, sb = 0;
        for (var i = 0; i < state.interests.length; i++) { if (a.interests.indexOf(state.interests[i]) !== -1) sa++; if (b.interests.indexOf(state.interests[i]) !== -1) sb++; }
        return sb !== sa ? sb - sa : a.distance - b.distance;
    });
}

function render() {
    var app = document.getElementById('app');
    if (state.screen === 'detail') { app.innerHTML = renderDetail(); }
    else if (state.screen === 'results') { app.innerHTML = renderResults(); }
    else if (state.screen === 'form') { app.innerHTML = renderForm(); }
    else { app.innerHTML = renderWelcome(); }
}

function renderWelcome() {
    return '<div class="hero"><div class="mascots">🦊 🐻 🦄</div><h1>KidPath</h1><p>Greater Seattle Metro Activities</p><div class="tag">Ages 0-5 | Personalized for your child</div></div>' +
    '<div class="welcome"><div class="speech">Hi! I am ' + state.mascot + ' your activity buddy! Let me find awesome things for your kiddo!</div>' +
    '<div class="label">👶 Child\'s name</div><input class="input" id="nameInput" placeholder="e.g., Emma, Liam, Aria..." value="' + state.childName + '">' +
    '<div class="label">🎂 Child\'s age (0-5)</div><input class="input" id="ageInput" placeholder="e.g., 3" maxlength="1" value="' + state.childAge + '">' +
    '<button class="btn btn-red" onclick="setState({childName:document.getElementById(\'nameInput\').value, childAge:document.getElementById(\'ageInput\').value, screen:\'form\'})">Let\'s Go! 🚀</button></div>' +
    '<div class="cities"><strong>🗺️ Covering Greater Seattle Metro</strong>Seattle | Bellevue | Kirkland | Redmond | Issaquah | Sammamish | Mercer Island | Newcastle</div>';
}

function renderForm() {
    var interests = [
        {id:'active',label:'Active & Energetic',icon:'🏃',color:'red'},
        {id:'creative',label:'Creative & Artsy',icon:'🎨',color:'purple'},
        {id:'curious',label:'Curious Explorer',icon:'🔭',color:'blue'},
        {id:'social',label:'Social Butterfly',icon:'🦋',color:'pink'},
        {id:'calm',label:'Calm & Mindful',icon:'🌸',color:'teal'},
        {id:'brave',label:'Brave Adventurer',icon:'🦁',color:'amber'}
    ];
    var areas = [{id:'any',l:'🗺️ Anywhere in Greater Seattle Metro'},{id:'seattle',l:'🏙️ Seattle'},{id:'bellevue',l:'🌆 Bellevue'},{id:'kirkland',l:'⛵ Kirkland'},{id:'redmond',l:'💻 Redmond'},{id:'issaquah',l:'⛰️ Issaquah'},{id:'sammamish',l:'🌲 Sammamish'},{id:'mercer_island',l:'🏝️ Mercer Island'},{id:'newcastle',l:'🏡 Newcastle'}];

    var h = '<div class="form-header"><div class="mascots">' + state.mascot + '</div><h2>What does ' + (state.childName || 'your little one') + ' love?</h2></div>';
    h += '<div class="form-section"><div class="label">🌈 Interests (pick all that fit!)</div><div class="chips">';
    for (var i = 0; i < interests.length; i++) {
        var on = state.interests.indexOf(interests[i].id) !== -1;
        h += '<div class="chip ' + (on ? 'active-' + interests[i].color : '') + '" onclick="toggleInterest(\'' + interests[i].id + '\')">' + interests[i].icon + ' ' + interests[i].label + '</div>';
    }
    h += '</div></div>';
    h += '<div class="form-section"><div class="label">📅 Days per week</div><div class="chips">';
    [1,2,3].forEach(function(d) { h += '<div class="chip ' + (state.maxDays===d?'active-blue':'') + '" onclick="setState({maxDays:' + d + '})">' + d + (d===3?'+':'') + ' day' + (d>1?'s':'') + '</div>'; });
    h += '</div></div>';
    h += '<div class="form-section"><div class="label">🚗 Max commute</div><div class="chips">';
    [3,5,10,15].forEach(function(d) { h += '<div class="chip ' + (state.commute===d?'active-teal':'') + '" onclick="setState({commute:' + d + '})">' + d + ' mi</div>'; });
    h += '</div></div>';
    h += '<div class="form-section"><div class="label">📍 Preferred area</div>';
    for (var i = 0; i < areas.length; i++) { h += '<div class="area-opt ' + (state.area===areas[i].id?'active':'') + '" onclick="setState({area:\'' + areas[i].id + '\'})">' + areas[i].l + '</div>'; }
    h += '</div>';
    h += '<div style="padding:16px"><button class="btn btn-red" onclick="setState({results:filterActivities(),screen:\'results\'})">🔍 Find Adventures!</button></div>';
    return h;
}

function renderResults() {
    var colors = ['#FF6B6B','#A855F7','#3B82F6','#14B8A6','#F59E0B','#EC4899'];
    var h = '<div class="back"><a onclick="setState({screen:\'form\'})">← Adjust Preferences</a></div>';
    h += '<div class="result-banner"><span class="mascot">' + state.mascot + '</span><h3>' + state.results.length + ' adventures for ' + (state.childName || 'your little one') + '!</h3></div>';
    if (state.results.length === 0) { h += '<div class="empty"><div class="emoji">🙈</div><p>No activities found!</p><p class="hint">Try "Anywhere" for area or increase commute distance.</p></div>'; }
    for (var i = 0; i < state.results.length; i++) {
        var a = state.results[i]; var c = colors[parseInt(a.id) % colors.length];
        h += '<div class="card" style="border-left-color:' + c + '" onclick="setState({selected:ACTIVITIES.find(function(x){return x.id===\'' + a.id + '\'}),screen:\'detail\'})">';
        h += '<div class="card-top"><span class="card-emoji">' + a.emoji + '</span><div style="flex:1"><div class="card-title">' + a.name + '</div><div class="card-sub">' + a.category + ' | ' + a.provider + '</div></div><span class="card-price" style="color:' + c + '">' + (a.price===0?'FREE!':'$'+a.price) + '</span></div>';
        h += '<div class="card-info">📍 ' + a.distance + ' mi | 👶 Ages ' + a.ageRange + ' | 📅 ' + a.days + 'x/wk</div>';
        h += '<div class="card-desc">' + a.description.substring(0,80) + '...</div></div>';
    }
    return h;
}

function renderDetail() {
    var a = state.selected;
    var h = '<div class="back"><a onclick="setState({screen:\'results\'})">← Back to Results</a></div>';
    h += '<div class="detail-head"><div class="emoji">' + a.emoji + '</div><h2>' + a.name + '</h2><div class="sub">' + a.provider + '</div><div class="badge">' + a.category + '</div></div>';
    h += '<div class="info-row"><div class="info-box orange"><div class="icon">📍</div><div class="val">' + a.distance + ' mi</div></div><div class="info-box green"><div class="icon">👶</div><div class="val">' + a.ageRange + ' yrs</div></div><div class="info-box blue"><div class="icon">💰</div><div class="val">' + (a.price===0?'FREE!':'$'+a.price) + '</div></div></div>';
    h += '<div class="section"><h3>🌟 About</h3><p>' + a.description + '</p></div>';
    h += '<div class="section"><h3>📅 Schedule</h3><p>' + a.schedule + '</p><p>' + a.days + ' day(s) per week</p></div>';
    h += '<div class="section"><h3>📍 Location</h3><p>' + a.address + '</p></div>';
    h += '<div style="padding:16px"><button class="btn btn-green" onclick="window.open(\'' + a.url + '\',\'_blank\')">🎉 Visit Website to Sign Up!</button></div>';
    return h;
}

render();
</script>
</body>
</html>
